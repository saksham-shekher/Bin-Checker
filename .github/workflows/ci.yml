name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Validate source data
        run: node scripts/validate.js

      - name: Build JS data files
        run: npm run build

      - name: Verify compiled output
        run: |
          test -f data/compiled/cards.json
          test -f data/compiled/cards-detailed.json
          echo "✓ Compiled output verified"

  test-lib:
    name: JS Library (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build JS data
        run: npm install --ignore-scripts && npm run build

      - name: Install library dependencies
        run: npm --prefix libs/javascript install

      - name: Run library tests
        run: npm --prefix libs/javascript test

  test-api:
    name: API Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build JS data
        run: npm install --ignore-scripts && npm run build

      - name: Install library dependencies
        run: npm --prefix libs/javascript install

      - name: Run API tests
        run: npm run api:test
